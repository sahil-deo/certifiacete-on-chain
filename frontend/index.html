<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChainCert | On-Chain Soulbound Certificates</title>
    <script src="https://unpkg.com/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        button { cursor: pointer; padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; transition: 0.2s; }
        #connectBtn { background-color: var(--primary); color: white; }
        #connectBtn.connected { background-color: #10b981; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
        .tab { padding: 10px 20px; background: none; color: #64748b; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); border-radius: 0; }
        .panel { display: none; background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .panel.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        .status { margin-top: 15px; padding: 10px; border-radius: 6px; display: none; font-size: 0.85rem; white-space: pre-wrap; }
        .status.show { display: block; }
        .status.error { background: #fee2e2; color: #991b1b; }
        .status.success { background: #dcfce7; color: #166534; }
        .status.info { background: #e0e7ff; color: #3730a3; }
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .card-img { height: 160px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-name { font-weight: 700; margin-bottom: 5px; }
        .card-course { color: var(--primary); font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; }
        .card-meta { font-size: 0.8rem; color: #64748b; }
        .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: rotate 0.8s linear infinite; margin-right: 8px; }
        @keyframes rotate { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ChainCert</h1>
        <button id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
    </header>

    <div id="walletBar" class="status info" style="margin-bottom: 20px; display: none;">
        Connected: <span id="walletAddr">0x...</span>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('mint', this)">Mint Certificate</button>
        <button class="tab" onclick="switchTab('search', this)">Verify & Search</button>
    </div>

    <div id="panel-mint" class="panel active">
        <div class="form-group">
            <label>Recipient Wallet Address</label>
            <input type="text" id="recipient" placeholder="0x...">
        </div>
        <div class="form-group" style="display: flex; gap: 15px;">
            <div style="flex: 2;">
                <label>Student Name</label>
                <input type="text" id="certName" placeholder="e.g. Naruto Uzumaki">
            </div>
            <div style="flex: 1;">
                <label>Issue Date</label>
                <input type="date" id="certDate">
            </div>
        </div>
        <div class="form-group">
            <label>Course Name</label>
            <input type="text" id="courseName" placeholder="e.g. Advanced Ninjutsu">
        </div>
        <div class="form-group">
            <label>Upload Certificate Image</label>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
            <p id="uploadName" style="font-size: 0.8rem; color: #10b981; margin-top: 5px; display: none;"></p>
        </div>
        <button id="mintBtn" onclick="mintCert()" style="background: var(--primary); color: white; width: 100%;">Mint Certificate</button>
        <div id="mintStatus" class="status"></div>
    </div>

    <div id="panel-search" class="panel">
        <div class="form-group" style="display: flex; gap: 10px;">
            <input type="text" id="searchQuery" placeholder="Wallet Address (0x...) or Token ID (0, 1...)">
            <button onclick="searchCerts()" style="background: var(--text); color: white;">Search</button>
        </div>
        <div id="searchStatus" class="status"></div>
        <div id="results"></div>
    </div>
</div>

<script>
    const CONTRACT_ADDRESS = "0x5FC8d32690cc91D4c39d9d3abcBD16989F875707";
    const PINATA_KEY = "0df22cea1b63dd225105";
    const PINATA_SECRET = "08fa8df0e76266149345cfe8f652dcca4845e3a134d2ed9260c8aba263a9fe49";

    // UPDATED ABI to include 5 arguments for mint and 3 fields for metaData
    const abi = [
        "function mint(address recepient, string name, string date, string course, string image) external returns (uint256)",
        "function getCertificateById(uint256 id) external view returns ((string name, string date, string course, string imageURI))",
        "function getCertificatesByAddress(address walletAddress) external view returns ((string name, string date, string course, string imageURI)[])",
        "function owner() public view returns (address)",
        "event Transfer(address indexed from, address indexed to, uint256 indexed tokenId)",
        "error TransferNotAllowed()",
        "error InvalidToken()"
    ];

    let provider, signer, contract, walletAddress, selectedFile;

    async function connectWallet() {
        if (!window.ethereum) return showStatus("mintStatus", "error", "Please install MetaMask");
        try {
            provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            walletAddress = accounts[0];
            
            contract = new ethers.Contract(CONTRACT_ADDRESS, abi, signer);

            const btn = document.getElementById("connectBtn");
            btn.textContent = walletAddress.slice(0,6) + "..." + walletAddress.slice(-4);
            btn.classList.add("connected");
            document.getElementById("walletAddr").textContent = walletAddress;
            document.getElementById("walletBar").style.display = "block";
        } catch (e) {
            showStatus("mintStatus", "error", e.message);
        }
    }

    function handleFile(e) {
        selectedFile = e.target.files[0];
        if (selectedFile) {
            const el = document.getElementById("uploadName");
            el.textContent = "Selected: " + selectedFile.name;
            el.style.display = "block";
        }
    }

    async function uploadIPFS(file) {
        const fd = new FormData();
        fd.append("file", file);
        const res = await fetch("https://api.pinata.cloud/pinning/pinFileToIPFS", {
            method: "POST",
            headers: { "pinata_api_key": PINATA_KEY, "pinata_secret_api_key": PINATA_SECRET },
            body: fd
        });
        if (!res.ok) throw new Error("IPFS Upload Failed");
        const d = await res.json();
        return "ipfs://" + d.IpfsHash;
    }

    function ipfsToHttp(uri) {
        if (!uri) return "";
        return uri.replace("ipfs://", "https://gateway.pinata.cloud/ipfs/");
    }

    async function mintCert() {
        if (!contract) return showStatus("mintStatus", "error", "Connect wallet first");
        
        const recipient = document.getElementById("recipient").value;
        const name = document.getElementById("certName").value;
        const date = document.getElementById("certDate").value;
        const course = document.getElementById("courseName").value; // NEW FIELD

        if (!recipient || !name || !course || !selectedFile) {
            return showStatus("mintStatus", "error", "Please fill all fields and select an image.");
        }

        const btn = document.getElementById("mintBtn");
        btn.disabled = true;
        btn.innerHTML = '<span class="spin"></span> Processing...';

        try {
            showStatus("mintStatus", "info", "Uploading image to IPFS...");
            const imageURI = await uploadIPFS(selectedFile);
            
            showStatus("mintStatus", "info", "Please confirm the transaction in MetaMask...");
            // Passing 5 arguments to match updated Solidity function
            const tx = await contract.mint(recipient, name, date, course, imageURI);
            
            showStatus("mintStatus", "info", "Transaction sent! Waiting for confirmation...");
            const receipt = await tx.wait();

            let mintedId = "Unknown";
            receipt.logs.forEach((log) => {
                try {
                    const parsedLog = contract.interface.parseLog(log);
                    if (parsedLog.name === "Transfer") {
                        mintedId = parsedLog.args.tokenId.toString();
                    }
                } catch (e) {}
            });

            const shareUrl = `${window.location.origin}${window.location.pathname}?certId=${mintedId}`;

            showStatus("mintStatus", "success", 
                `Successfully Minted!\n` +
                `Certificate ID: ${mintedId}\n` +
                `Share Link: ${shareUrl}`
            );
            
            // Clear fields
            document.getElementById("recipient").value = "";
            document.getElementById("certName").value = "";
            document.getElementById("courseName").value = "";
            document.getElementById("fileInput").value = "";
            document.getElementById("uploadName").style.display = "none";

        } catch (e) {
            console.error(e);
            let errorMessage = e.reason || e.message;
            if (errorMessage.includes("user rejected")) errorMessage = "Transaction cancelled by user.";
            showStatus("mintStatus", "error", errorMessage);
        } finally {
            btn.disabled = false;
            btn.innerHTML = "Mint Certificate";
        }
    }
    
    async function searchCerts() {
        const q = document.getElementById("searchQuery").value.trim();
        if (!q || !contract) return;

        document.getElementById("results").innerHTML = "";
        showStatus("searchStatus", "info", "Fetching records...");

        try {
            let results = [];
            if (ethers.isAddress(q)) {
                results = await contract.getCertificatesByAddress(q);
            } else {
                const single = await contract.getCertificateById(q);
                results = [single];
            }

            if (results.length === 0) throw new Error("No records found");
            renderCards(results);
            showStatus("searchStatus", "success", `Found ${results.length} certificate(s)`);
        } catch (e) {
            showStatus("searchStatus", "error", "No certificates found.");
        }
    }

    function renderCards(certs) {
        const container = document.getElementById("results");
        const grid = document.createElement("div");
        grid.className = "cards";
        
        certs.forEach(c => {
            const card = document.createElement("div");
            card.className = "card";
            // Map course field from the struct (c[2] or c.course)
            card.innerHTML = `
                <div class="card-img"><img src="${ipfsToHttp(c.imageURI)}" alt="Cert"></div>
                <div class="card-body">
                    <div class="card-name">${c.name}</div>
                    <div class="card-course">${c.course}</div>
                    <div class="card-meta">
                        <div>Issued: ${c.date}</div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
        container.appendChild(grid);
    }

    function showStatus(id, type, msg) {
        const el = document.getElementById(id);
        el.className = `status ${type} show`;
        el.textContent = msg;
    }

    function switchTab(name, btn) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + name).classList.add('active');
    }

    async function checkUrlParams() {
        const urlParams = new URLSearchParams(window.location.search);
        const certId = urlParams.get('certId');
        if (certId) {
            const searchTabBtn = document.querySelector(".tab[onclick*='search']");
            switchTab('search', searchTabBtn);
            document.getElementById("searchQuery").value = certId;
            const retrySearch = setInterval(async () => {
                if (contract) {
                    clearInterval(retrySearch);
                    await searchCerts();
                }
            }, 500);
            if (!walletAddress) connectWallet();
        }
    }

    window.addEventListener('load', checkUrlParams);
    document.getElementById("certDate").valueAsDate = new Date();
</script>

</body>
</html>
